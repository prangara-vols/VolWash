<!DOCTYPE html>
<html>
<head>
  <title>Laundry Status</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>

<body style="font-family: Arial; text-align:center;">

  <h1>Washer 1 Status</h1>

  <h2 id="status">Loading...</h2>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyA8TsVM19zSqGhKo4L_zMnV8acPXaVl4sA",
      databaseURL: "https://laundryapp-cd794-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const statusRef = db.ref("/machines/washer1/status");

    statusRef.on("value", (snapshot) => {
      document.getElementById("status").innerText = snapshot.val();

      if (snapshot.val() === "IN USE") {
        document.body.style.background = "red";
      } else {
        document.body.style.background = "green";
      }
    });
  </script>

</body>
</html>
